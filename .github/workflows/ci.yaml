name: Build 

on: [ push, pull_request ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build
      - name: Clippy
        run: |
          rustup component add clippy
          cargo clippy --all-targets

